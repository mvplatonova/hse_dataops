global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s  
  external_labels:
    monitor: 'dataops-monitor'
    environment: 'development'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
          instance: 'prometheus-server'
  
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
        labels:
          service: 'node-exporter'
          instance: 'docker-host'
  
  - job_name: 'ml-service'
    static_configs:
      - targets: ['ml-service:8000']
        labels:
          service: 'ml-service'
          instance: 'ml-service-1'
    metrics_path: '/metrics'

